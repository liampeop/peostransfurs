modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''${mod_description}'''

[[dependencies."${mod_id}"]]
modId = "forge"
mandatory = true
versionRange = "${forge_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId="changed"
mandatory=true
versionRange="[0.15.4]" # Replace with the version you plan to mod
ordering="NONE"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="pehkui"
mandatory=true
versionRange="[3.8.2+1.20.1-forge]" # Replace with the version you plan to mod
ordering="AFTER"
side="BOTH"
